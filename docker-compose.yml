services:

  # ─── Ollama ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "${OLLAMA_PORT}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Model Puller (runs once, then exits) ────────────────
  model-puller:
    image: ollama/ollama:latest
    container_name: model-puller
    entrypoint: ["/bin/sh", "-c"]
    command: ["sh", "-c", "echo '>>> Pulling ${MODEL}' && ollama pull ${MODEL} && echo '>>> Done.'"]
    environment:
      - MODEL=${MODEL}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_storage:/root/.ollama

  # ─── OpenCode Agent ──────────────────────────────────────
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-agent
    environment:
      - MODEL=${MODEL}
      - OLLAMA_PORT=${OLLAMA_PORT}
    volumes:
      - ./plugins:/home/op/workspace/plugins
      - ./results/opencode:/home/op/workspace/results
    working_dir: /home/op/workspace
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    stdin_open: true
    tty: true

  # ─── Aider Agent ─────────────────────────────────────────
  aider:
    image: ${AIDER_IMAGE}
    container_name: aider-agent
    environment:
      - OPENAI_API_KEY=nothing
      - OPENAI_API_BASE=http://ollama:11434/v1
    volumes:
      - ./plugins:/app/plugins
      - ./results/aider:/app/results
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    command: >
      aider
      --model openai/${MODEL}
      --openai-api-base http://ollama:11434/v1
      --no-git

volumes:
  ollama_storage:
